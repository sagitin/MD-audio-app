<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Button App</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;
      color: white;

      background-image: url("Field1.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: black;
    }

    /* Top-left dropdown */
    .top-bar {
      position: fixed;
      top: 20px;
      left: 20px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: rgba(0, 0, 0, 0.6);
      color: white;
    }

    /* Bottom-right buttons */
    .button-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: rgba(0, 0, 0, 0.6);
      color: white;
    }
  </style>
</head>

<body>

  <!-- Theme dropdown -->
  <div class="top-bar">
    <select id="themeSelect" onchange="changeTheme()">
      <option value="theme1">Theme 1</option>
      <option value="theme2">Theme 2</option>
      <option value="theme3">Theme 3</option>
    </select>
  </div>

  <!-- Buttons -->
  <div class="button-container">
    <button onclick="playSound('battle')">Battle Theme</button>
    <button onclick="playSound('keycard')">Key Card</button>
    <button onclick="playSound('climax')">Climax</button>
    <button onclick="stopSound()">Stop</button>
  </div>

  <script>
    let audio = new Audio();
    audio.loop = true;

    let currentTheme = 1;

    function playSound(type) {
      let file = "";

      if (type === "battle") {
        file = `BattleTheme${currentTheme}.mp3`;
      } else if (type === "keycard") {
        file = `KeyCard${currentTheme}.mp3`;
      } else if (type === "climax") {
        file = `Climax${currentTheme}.mp3`;
      }

      audio.pause();
      audio = new Audio(file);
      audio.loop = true;
      audio.play();
    }

    function stopSound() {
      audio.pause();
    }

    function changeTheme() {
      const theme = document.getElementById("themeSelect").value;

      if (theme === "theme1") {
        currentTheme = 1;
        document.body.style.backgroundImage = "url('Field1.png')";
      } else if (theme === "theme2") {
        currentTheme = 2;
        document.body.style.backgroundImage = "url('Field2.png')";
      } else if (theme === "theme3") {
        currentTheme = 3;
        document.body.style.backgroundImage = "url('Field3.png')";
      }
    }
  </script>

</body>
</html>
